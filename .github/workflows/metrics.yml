name: Metrics
on:
  # Her 6 saatte bir otomatik güncellensin
  schedule: [{cron: "0 */6 * * *"}]
  # main branch'e her push'ta da yenilensin
  push: {branches: ["main", "master"]}
  # Manuel olarak da tetikleyebilesin
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # --------------------------------------------------------
      # 1) Genel görünüm (klasik kart) — animasyonlu
      # --------------------------------------------------------
      - name: Genel Metrikler
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huseyinelmuhaammed
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Istanbul
          config_animations: yes
          config_padding: 0, 8 + 11%

      # --------------------------------------------------------
      # 2) İzometrik commit takvimi — 3D animasyonlu calendar
      # --------------------------------------------------------
      - name: İzometrik Takvim
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huseyinelmuhaammed
          base: ""
          config_timezone: Europe/Istanbul
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # --------------------------------------------------------
      # 3) Kullandığın diller — yüzdeli grafik
      # --------------------------------------------------------
      - name: Kullandığım Diller
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huseyinelmuhaammed
          base: ""
          config_timezone: Europe/Istanbul
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15

      # --------------------------------------------------------
      # 4) 3D Skyline — yıllık aktivite 3D bina görünümü
      # --------------------------------------------------------
      - name: Skyline
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          filename: metrics.plugin.skyline.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huseyinelmuhaammed
          base: ""
          config_timezone: Europe/Istanbul
          retries: 3
          retries_delay: 30
          plugin_skyline: yes
          plugin_skyline_year: ""
          plugin_skyline_frames: 60
          plugin_skyline_quality: 1

      # --------------------------------------------------------
      # 5) Topics — yıldızladığın teknolojik ilgi alanları
      # --------------------------------------------------------
      - name: İlgi Alanları
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          filename: metrics.plugin.topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huseyinelmuhaammed
          base: ""
          config_timezone: Europe/Istanbul
          retries: 3
          retries_delay: 30
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          plugin_topics_sort: stars

      # --------------------------------------------------------
      # 6) Followup — issue ve PR durumun
      # --------------------------------------------------------
      - name: Issues & PR Durumu
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: metrics.plugin.followup.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huseyinelmuhaammed
          base: ""
          config_timezone: Europe/Istanbul
          plugin_followup: yes

      # --------------------------------------------------------
      # 7) Terminal görünümlü kart — bonus stil
      # --------------------------------------------------------
      - name: Terminal Görünüm
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          filename: metrics.terminal.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: huseyinelmuhaammed
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Istanbul
